{% extends 'clinique/base.html' %}
{% block title %}Supprimer — Cabinet Médical{% endblock %}
{% block page_title %}Confirmer la suppression{% endblock %}

{% block content %}
<div style="max-width:460px; margin:40px auto">
    <div class="card">
        <div class="card-body" style="text-align:center; padding:40px 32px">
            <div style="width:56px; height:56px; border-radius:50%; background:#fcebeb; display:flex; align-items:center; justify-content:center; margin:0 auto 20px">
                <svg width="24" height="24" fill="none" stroke="#a32d2d" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </div>
            <p style="font-size:15px; font-weight:600; color:#1a1a1a; margin-bottom:8px">
                Supprimer ce {{ type }} ?
            </p>
            <p style="font-size:13px; color:#999; margin-bottom:32px">
                {{ objet }}<br>
                <span style="font-size:12px; color:#bbb; margin-top:4px; display:block">Cette action est irréversible.</span>
            </p>
            <form method="post">
                {% csrf_token %}
                <div style="display:flex; gap:10px; justify-content:center">
                    <button type="submit" class="btn btn-red-soft">
                        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="width:14px;height:14px"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        Oui, supprimer
                    </button>
                    <a href="javascript:history.back()" class="btn btn-ghost">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
